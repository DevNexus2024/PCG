<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - The Pizza Club and Grill</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="images/images_(1).jpeg" alt="The Pizza Club and Grill Logo" class="brand-logo">
                <span>THE PIZZA CLUB AND GRILL</span>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="notificationBtn">
                    <i class="fas fa-bell"></i>
                    <span class="notification-count" id="notificationCount">0</span>
                </button>
                <button class="btn btn-outline" id="orderTrackingBtn">
                    <i class="fas fa-receipt"></i>
                    <span>Orders</span>
                </button>
                <button class="btn btn-outline" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
                <button class="btn btn-primary" id="userBtn">
                    <i class="fas fa-user"></i>
                    <span id="userName">LOGOUT</span>
                </button>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Menu Section -->
    <section class="menu-section">
        <div class="container">
            <div class="menu-header">
                <h1>Our Menu</h1>
                <p>Delicious food, delivered fresh to your door</p>
            </div>

            <!-- Category Filter -->
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">All Items</button>
                <button class="filter-btn" data-category="pizza">Pizza</button>
                <button class="filter-btn" data-category="grill">Grill</button>
                <button class="filter-btn" data-category="appetizers">Appetizers</button>
                <button class="filter-btn" data-category="drinks">Drinks</button>
                <button class="filter-btn" data-category="desserts">Desserts</button>
            </div>

            <!-- Menu Items Grid -->
            <div class="menu-grid" id="menuGrid">
                <p class="loading-text">Loading menu...</p>
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <p class="empty-cart">Your cart is empty</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">E0.00</span>
            </div>
            <button class="btn btn-primary btn-full" onclick="checkout()">
                Checkout
            </button>
        </div>
    </div>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notificationPanel">
        <div class="notification-header">
            <h3><i class="fas fa-bell"></i> Notifications</h3>
            <button class="close-notification" onclick="toggleNotifications()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="notification-list" id="notificationList">
            <p class="empty-notifications">No notifications yet</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 The Pizza Club and Grill. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/menu.js"></script>
    <script>
        // Mobile menu toggle
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');

        if (hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }

        // Cart toggle
        function toggleCart() {
            const cartSidebar = document.getElementById('cartSidebar');
            cartSidebar.classList.toggle('active');
        }

        // Notification toggle
        function toggleNotifications() {
            const notificationPanel = document.getElementById('notificationPanel');
            notificationPanel.classList.toggle('active');
        }

        document.getElementById('cartBtn').addEventListener('click', toggleCart);
        document.getElementById('notificationBtn').addEventListener('click', toggleNotifications);

        // User button
        document.getElementById('userBtn').addEventListener('click', () => {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // User logged in - show options or logout
                    if (confirm('Do you want to logout?')) {
                        auth.signOut().then(() => {
                            window.location.href = 'index.html';
                        });
                    }
                } else {
                    // Not logged in
                    window.location.href = 'login.html';
                }
            });
        });

        // Check auth state
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').textContent = user.displayName || 'Account';
            } else {
                document.getElementById('userName').textContent = 'Login';
            }
        });
    </script>
</body>
</html>
